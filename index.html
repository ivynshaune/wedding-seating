<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Seat</title>

<style>
body {
    font-family: Georgia, serif;
    background: #f8f5f2;
    text-align: center;
    padding: 20px;
}

h1 {
    color: #9c6b5f;
}

input {
    padding: 12px;
    width: 250px;
    border-radius: 30px;
    border: 1px solid #d8cfc9;
    font-size: 16px;
}

button {
    padding: 12px 20px;
    border-radius: 30px;
    border: none;
    background-color: #c8a27c;
    color: white;
    cursor: pointer;
}

#mapContainer {
    position: relative;
    width: 100%;
    max-width: 568px;
    aspect-ratio: 568 / 654;
    margin: 30px auto;
    display: none;
}

#floorplan {
    width: 100%;
    height: auto;
    display: block;
}

#pathCanvas {
    position: absolute;
    left: 0;
    top: 0;
}

.highlight {
    position: absolute;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 4px solid gold;
    transform: translate(-50%, -50%);
    pointer-events: none;
}
#suggestions {
    width: 250px;
    margin: 5px auto;
    background: white;
    border: 1px solid #d8cfc9;
    border-radius: 10px;
    display: none;
    text-align: left;
    max-height: 150px;
    overflow-y: auto;
}

.suggestion-item {
    padding: 8px 12px;
    cursor: pointer;
}

.suggestion-item:hover {
    background-color: #f3e8e2;
}

</style>
</head>

<body>

<h1>Find Your Seat</h1>

<input type="text" id="nameInput" placeholder="Enter your name">
<button onclick="findSeat()">Search</button>

<div id="suggestions"></div>   <!-- ADD THIS -->

<p id="result"></p>

<div id="mapContainer">
    <div id="mapInner">
        <img id="floorplan" src="floorplan.png">
        <canvas id="pathCanvas" width="568" height="654"></canvas>
    </div>
</div>

<script>

let guests = {};
let tables = {};
let entrance = {x: 230, y: 501}; // bottom centre for 568x654

// Load guest + table data
async function loadData() {
    const guestData = await fetch("guests.csv").then(r => r.text());

    guestData.split("\n").slice(1).forEach(line => {
        let [first, last, table] = line.split(",");

        if(first && last && table) {
            let key = (first.trim() + " " + last.trim()).toLowerCase();

            guests[key] = {
                first: first.trim(),
                last: last.trim(),
                table: table.trim()
            };
        }
    });

    tables = await fetch("tables.json").then(r => r.json());
}
loadData();

function findSeat() {
    let name = document.getElementById("nameInput").value.toLowerCase().trim();
    let guest = guests[name];

    if(!guest) {
        document.getElementById("result").innerText = "Name not found.";
        return;
    }

    document.getElementById("result").innerText =
        "Welcome! You are seated at Table " + guest.table;

    showMap(guest.table);
}

function showMap(table) {

    document.getElementById("mapContainer").style.display = "block";

    // Clear old highlight
    let old = document.querySelector(".highlight");
    if(old) old.remove();

    let coords = tables[table];
    if(!coords) return;

    // Create highlight circle
    let highlight = document.createElement("div");
    highlight.className = "highlight";

highlight.style.left = (coords.x * scaleX) + "px";
highlight.style.top = (coords.y * scaleY) + "px";
    document.getElementById("mapContainer").appendChild(highlight);

    // Draw path
    let canvas = document.getElementById("pathCanvas");
    let ctx = canvas.getContext("2d");

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "#e6b7a9";
    ctx.lineWidth = 4;

    ctx.beginPath();
const scaleX = rect.width / 568;
const scaleY = rect.height / 654;

ctx.moveTo(entrance.x * scaleX, entrance.y * scaleY);
ctx.lineTo(coords.x * scaleX, coords.y * scaleY);
    ctx.stroke();
}
window.addEventListener("load", function() {

    const map = document.getElementById("mapContainer");
    const img = document.getElementById("floorplan");
    const rect = img.getBoundingClientRect();

canvas.height = rect.height;

});
const input = document.getElementById("nameInput");
const suggestionsBox = document.getElementById("suggestions");

input.addEventListener("input", function() {
    const value = this.value.toLowerCase().trim();
    suggestionsBox.innerHTML = "";

    if (value === "") {
        suggestionsBox.style.display = "none";
        return;
    }

    // Sort alphabetically
    const matches = Object.keys(guests)
        .filter(name => name.includes(value))
        .sort((a, b) => {
    const lastA = a.split(" ")[1];
    const lastB = b.split(" ")[1];
    return lastA.localeCompare(lastB);
});

    if (matches.length === 0) {
        suggestionsBox.style.display = "none";
        return;
    }

    matches.forEach(fullName => {

    const guest = guests[fullName];

    const displayName =
        guest.last + ", " + guest.first;

    const regex = new RegExp("(" + value + ")", "gi");
    const highlighted = displayName.replace(regex, "<strong>$1</strong>");

    const div = document.createElement("div");
    div.className = "suggestion-item";
    div.innerHTML = highlighted;

    div.onclick = function() {
        input.value = guest.first + " " + guest.last;
        suggestionsBox.style.display = "none";
    };

    suggestionsBox.appendChild(div);
});

    suggestionsBox.style.display = "block";
});

</script>

</body>
</html>
