<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Find Your Seat</title>
<style>
body {
    font-family: "Georgia", serif;
    background: #f8f5f2;
    text-align: center;
    padding: 20px;
}
h1 {
    color: #9c6b5f;
}
input {
    padding: 12px;
    width: 250px;
    border-radius: 30px;
    border: 1px solid #d8cfc9;
    font-size: 16px;
}
button {
    padding: 12px 20px;
    border-radius: 30px;
    border: none;
    background-color: #c8a27c;
    color: white;
    cursor: pointer;
}
#mapContainer {
    position: relative;
    margin-top: 30px;
    display: none;
}
#floorplan {
    width: 100%;
    max-width: 600px;
}
.highlight {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 4px solid gold;
    pointer-events: none;
    animation: glow 1.5s infinite alternate;
}
@keyframes glow {
    from { box-shadow: 0 0 5px gold; }
    to { box-shadow: 0 0 20px gold; }
}
#path {
    position: absolute;
    pointer-events: none;
}
</style>
</head>
<body>

<h1>Find Your Seat</h1>
<input type="text" id="nameInput" placeholder="Enter your name">
<button onclick="findSeat()">Search</button>

<p id="result"></p>

<div id="mapContainer">
    <img id="floorplan" src="floorplan.png">
    <canvas id="path"></canvas>
</div>

<script>
<script>
let guests = {};
let tables = {};
let entrance = {x: 217, y: 490}; // bottom centre for 434x502 image

async function loadData() {
    const guestData = await fetch("guests.csv").then(r => r.text());
    guestData.split("\n").forEach(line => {
        let [name, table] = line.split(",");
        if(name && table) guests[name.trim().toLowerCase()] = table.trim();
    });

    tables = await fetch("tables.json").then(r => r.json());
}
loadData();

function findSeat() {
    let name = document.getElementById("nameInput").value.toLowerCase().trim();
    let table = guests[name];
    if(!table) {
        document.getElementById("result").innerText = "Name not found.";
        return;
    }

    document.getElementById("result").innerText = 
        "Welcome! You are seated at Table " + table;

    showMap(table);
}

function showMap(table) {
    const map = document.getElementById("mapContainer");
    map.style.display = "block";

    const floor = document.getElementById("floorplan");
    const canvas = document.getElementById("path");

    canvas.width = floor.clientWidth;
    canvas.height = floor.clientHeight;

    let coords = tables[table];

    let highlight = document.createElement("div");
    highlight.className = "highlight";
    highlight.style.left = coords.x + "px";
    highlight.style.top = coords.y + "px";
    map.appendChild(highlight);

    let ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#e6b7a9";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(entrance.x, entrance.y);
    ctx.lineTo(coords.x, coords.y);
    ctx.stroke();
}

// ✅ CLICK COORDINATE TOOL (FIXED)
window.addEventListener("load", function() {
    const floor = document.getElementById("floorplan");
    floor.addEventListener("click", function(e) {
        const rect = floor.getBoundingClientRect();
        const x = Math.round(e.clientX - rect.left);
        const y = Math.round(e.clientY - rect.top);
        alert("X: " + x + " Y: " + y);
    });
});
</script>
};
</script>

</body>
</html>
